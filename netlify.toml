[build]
  publish = "dist"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

[[redirects]]
  from = "https://genzopia.xyz/*"
  to   = "https://www.genzopia.xyz/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
